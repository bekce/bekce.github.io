<!-- .. Function that generates a list of 10 passwords and inserts them into the page. -->
<script type="text/javascript">
function generate(idname) {
  var x = "";
  var s;
  var pwl = document.getElementById("pwlSelect").options[document.getElementById("pwlSelect").selectedIndex].innerHTML;
  for (i=0; i<=10; i++) {
    s = "";
    while (s.length < parseInt(pwl)-1) {
      s = GPW.pronounceable(parseInt(pwl));
      var rand3 = Math.random();
      if(document.getElementById("useNumbers").checked){
        s += Math.floor( 10 + (rand3 * 90) );
      }
    }
    x += s + "<br>";
  }
  var v = document.getElementById(idname);
  v.innerHTML = x;
  return false;
} // generate
window.onload = function() {
  generate('text'); addEventHandlers(); displayPassword();
}
</script>
